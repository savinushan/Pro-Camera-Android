name: Android Build Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # GitHub එකේ තියෙන Gradle සිස්ටම් එක කෙලින්ම සෙට් කරගන්නවා
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.1.1

    # gradlew වෙනුවට කෙලින්ම gradle command එකෙන් බිල්ඩ් කරනවා
    - name: Build APK
      run: gradle assembleDebug

    - name: Upload Generated APK
      uses: actions/upload-artifact@v4
      with:
        name: Professional-Camera-APK
        path: app/build/outputs/apk/debug/app-debug.apk
